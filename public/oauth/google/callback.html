<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Calendar connected</title>
    <style>
      body {
        align-items: center;
        background: #0f0f12;
        color: #f5f5f7;
        display: flex;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      p {
        color: #a1a1aa;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <p>Finishing Google Calendar connection...</p>
    <script>
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const query = new URLSearchParams(window.location.search);

      window.opener?.postMessage({
        type: 'flowspace-google-calendar-oauth',
        accessToken: hash.get('access_token'),
        code: query.get('code'),
        error: hash.get('error') || query.get('error'),
        errorDescription: hash.get('error_description') || query.get('error_description'),
        state: hash.get('state') || query.get('state'),
      }, window.location.origin);

      window.close();
    </script>
  </body>
</html>
